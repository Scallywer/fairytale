services:
  fairytale-app:
    image: ghcr.io/scallywer/fairytale:latest
    container_name: fairytale-app
    restart: unless-stopped
    ports:
      - "8889:3000"
    environment:
      # Admin password should be provided via environment, not hardcoded.
      # Set ADMIN_PASSWORD in your local .env or deployment secrets.
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    # Database is included in the Docker image, no volume mount needed
    # volumes:
    #   - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
